openapi: 3.0.3
info:
  title: Statis Pro Football (SPF) API
  description: HTTP API for running Statis Pro Football tabletop game simulations.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /offense/lineup:
    get:
      summary: Get offensive lineup
      operationId: getOffensiveLineup
      tags: [Offense]
      responses:
        "200":
          description: Current offensive lineup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OffenseIDLineup"
        "500":
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
    post:
      summary: Set offensive lineup
      operationId: setOffensiveLineup
      tags: [Offense]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OffenseIDLineup"
            examples:
              kickoff:
                summary: Kickoff offense lineup (kicker only)
                value:
                  k: "K-6"
              standard:
                summary: Standard offense lineup
                value:
                  le: "TE-87"
                  re: "WR-81"
                  fl1: "WR-82"
                  fl2: null
                  qb: "QB-7"
                  b1: "RB-44"
                  b2: "RB-30"
                  b3: null
                  lt: "OL-71"
                  lg: "OL-63"
                  c: "OL-52"
                  rg: "OL-66"
                  rt: "OL-75"
      responses:
        "200":
          description: Offensive lineup set
          content:
            text/plain:
              schema:
                type: string
                example: "Offensive lineup set."
        "400":
          description: Invalid lineup
          content:
            text/plain:
              schema:
                type: string

  /offense/call:
    post:
      summary: Set offense play call
      operationId: setOffenseCall
      tags: [Offense]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OffenseCall"
            examples:
              kickoff:
                summary: Kickoff call (normal or onside)
                value:
                  onside: false
              punt:
                summary: Punt call
                value:
                  coffin_corner: 0
              standard_run:
                summary: Standard run play call
                value:
                  play_type: "IR"
                  strategy: "NoStrategy"
                  target: "B1"
              standard_pass:
                summary: Standard pass play call
                value:
                  play_type: "SH"
                  strategy: "NoStrategy"
                  target: "RE"
      responses:
        "200":
          description: Offense play set
          content:
            text/plain:
              schema:
                type: string
                example: "Offense play set."
        "400":
          description: Invalid play call
          content:
            text/plain:
              schema:
                type: string

  /defense/lineup:
    get:
      summary: Get defensive lineup
      operationId: getDefensiveLineup
      tags: [Defense]
      responses:
        "200":
          description: Current defensive lineup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefenseIDLineup"
        "500":
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
    post:
      summary: Set defensive lineup
      operationId: setDefensiveLineup
      tags: [Defense]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DefenseIDLineup"
            examples:
              kickoff:
                summary: Kickoff defense lineup (kick returner only)
                value:
                  kr: "KR-28"
              standard:
                summary: Standard defense lineup
                value:
                  box_a: ["DL-72"]
                  box_b: ["DL-78"]
                  box_c: ["DL-75"]
                  box_d: ["DL-68"]
                  box_e: ["LB-56"]
                  box_f: "LB-55"
                  box_g: "LB-50"
                  box_h: null
                  box_i: "CB-24"
                  box_j: "CB-31"
                  box_k: null
                  box_l: ["S-43"]
                  box_m: "S-20"
                  box_n: null
                  box_o: null
      responses:
        "200":
          description: Defensive lineup set
          content:
            text/plain:
              schema:
                type: string
                example: "Defensive lineup set."
        "400":
          description: Invalid lineup
          content:
            text/plain:
              schema:
                type: string

  /defense/call:
    post:
      summary: Set defense play call
      operationId: setDefenseCall
      tags: [Defense]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DefenseCall"
            examples:
              kickoff:
                summary: Kickoff defense call (no options)
                value: {}
              punt:
                summary: Punt defense call
                value:
                  attempt_block: false
              standard_run:
                summary: Standard run defense call
                value:
                  defense_type: "RunDefense"
                  strategy: "Straight"
                  key: null
                  def_players: []
              standard_pass:
                summary: Standard pass defense with double cover
                value:
                  defense_type: "PassDefense"
                  strategy: "DoubleCover"
                  key: "RE"
                  def_players: ["CB-24"]
      responses:
        "200":
          description: Defense play set
          content:
            text/plain:
              schema:
                type: string
                example: "Defense play set."
        "400":
          description: Invalid play call
          content:
            text/plain:
              schema:
                type: string

  /game/play:
    post:
      summary: Run the current play
      operationId: runPlay
      tags: [Game]
      responses:
        "200":
          description: Play result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayResult"
        "400":
          description: Cannot run play (missing lineup or call)
          content:
            text/plain:
              schema:
                type: string

  /game/plays:
    get:
      summary: Get play history
      operationId: getAllPlays
      tags: [Game]
      parameters:
        - name: result
          in: query
          description: If true, return only PlayResult and GameState (omit full play details)
          schema:
            type: boolean
            default: false
        - name: count
          in: query
          description: Return only the last N plays
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: List of plays executed so far
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayAndState"

  /game/state:
    get:
      summary: Get current game state
      operationId: getGameState
      tags: [Game]
      responses:
        "200":
          description: Current game state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameState"

  /game/nexttype:
    get:
      summary: Get allowed play types for the next play
      operationId: getNextPlayTypes
      tags: [Game]
      responses:
        "200":
          description: List of allowed play types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayType"
    post:
      summary: Set the next play type
      operationId: setNextPlayType
      tags: [Game]
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              $ref: "#/components/schemas/PlayType"
            examples:
              kickoff:
                value: "Kickoff"
              standard:
                value: "Standard"
              punt:
                value: "Punt"
              field_goal:
                value: "FieldGoal"
              extra_point:
                value: "ExtraPoint"
      responses:
        "200":
          description: Play type set
          content:
            application/json:
              schema:
                type: string
                example: "Set"
        "400":
          description: Invalid or disallowed play type
          content:
            text/plain:
              schema:
                type: string

  /game/save:
    post:
      summary: Save game to file
      operationId: saveGame
      tags: [Game]
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              description: Filename to save the game to
              example: "savegame_01.json"
      responses:
        "200":
          description: Game saved
          content:
            application/json:
              schema:
                type: string
                example: "Set"
        "400":
          description: Save failed
          content:
            text/plain:
              schema:
                type: string

  /getplayer/{id}:
    get:
      summary: Get a player by ID
      operationId: getPlayer
      tags: [Players]
      parameters:
        - name: id
          in: path
          required: true
          description: "Player ID (e.g. QB-12, RB-44, WR-81)"
          schema:
            type: string
      responses:
        "200":
          description: Player data
          content:
            application/json:
              schema:
                type: object
                description: Player stats (shape varies by position)

  /players/{team}:
    get:
      summary: Get all players on a team roster
      operationId: getTeamPlayers
      tags: [Players]
      parameters:
        - name: team
          in: path
          required: true
          description: "Team designation: 'home' or 'away'"
          schema:
            type: string
            enum: [home, away]
      responses:
        "200":
          description: Full team roster
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializableRoster"
        "404":
          description: Team not found (invalid team parameter)

components:
  schemas:
    # --- Lineup Schemas ---

    OffenseIDLineup:
      description: "Offensive lineup - either kickoff (kicker only) or standard (full 11-man)"
      oneOf:
        - $ref: "#/components/schemas/KickoffIDOffenseLineup"
        - $ref: "#/components/schemas/StandardIDOffenseLineup"

    KickoffIDOffenseLineup:
      type: object
      required: [k]
      properties:
        k:
          type: string
          description: Kicker player ID
          example: "K-6"

    StandardIDOffenseLineup:
      type: object
      properties:
        le:
          type: string
          nullable: true
          description: Left End
        re:
          type: string
          nullable: true
          description: Right End
        fl1:
          type: string
          nullable: true
          description: Flanker 1
        fl2:
          type: string
          nullable: true
          description: Flanker 2
        qb:
          type: string
          nullable: true
          description: Quarterback
        b1:
          type: string
          nullable: true
          description: Back 1
        b2:
          type: string
          nullable: true
          description: Back 2
        b3:
          type: string
          nullable: true
          description: Back 3
        lt:
          type: string
          nullable: true
          description: Left Tackle
        lg:
          type: string
          nullable: true
          description: Left Guard
        c:
          type: string
          nullable: true
          description: Center
        rg:
          type: string
          nullable: true
          description: Right Guard
        rt:
          type: string
          nullable: true
          description: Right Tackle

    DefenseIDLineup:
      description: "Defensive lineup - either kickoff (returner only) or standard (full defense)"
      oneOf:
        - $ref: "#/components/schemas/KickoffIDDefenseLineup"
        - $ref: "#/components/schemas/StandardIDDefenseLineup"

    KickoffIDDefenseLineup:
      type: object
      required: [kr]
      properties:
        kr:
          type: string
          description: Kick returner player ID
          example: "KR-28"

    StandardIDDefenseLineup:
      type: object
      properties:
        box_a:
          type: array
          items:
            type: string
          description: Defensive box A players
        box_b:
          type: array
          items:
            type: string
          description: Defensive box B players
        box_c:
          type: array
          items:
            type: string
          description: Defensive box C players
        box_d:
          type: array
          items:
            type: string
          description: Defensive box D players
        box_e:
          type: array
          items:
            type: string
          description: Defensive box E players
        box_f:
          type: string
          nullable: true
          description: Defensive box F player
        box_g:
          type: string
          nullable: true
          description: Defensive box G player
        box_h:
          type: string
          nullable: true
          description: Defensive box H player
        box_i:
          type: string
          nullable: true
          description: Defensive box I player
        box_j:
          type: string
          nullable: true
          description: Defensive box J player
        box_k:
          type: string
          nullable: true
          description: Defensive box K player
        box_l:
          type: array
          items:
            type: string
          description: Defensive box L players
        box_m:
          type: string
          nullable: true
          description: Defensive box M player
        box_n:
          type: string
          nullable: true
          description: Defensive box N player
        box_o:
          type: string
          nullable: true
          description: Defensive box O player

    # --- Play Call Schemas ---

    OffenseCall:
      description: "Offense play call - varies by play type context"
      oneOf:
        - $ref: "#/components/schemas/KickoffOffenseCall"
        - $ref: "#/components/schemas/PuntOffenseCall"
        - $ref: "#/components/schemas/StandardOffenseCall"

    KickoffOffenseCall:
      type: object
      required: [onside]
      properties:
        onside:
          type: boolean
          description: Whether to attempt an onside kick
          example: false

    PuntOffenseCall:
      type: object
      required: [coffin_corner]
      properties:
        coffin_corner:
          type: integer
          description: "Coffin corner attempt (0 = no attempt)"
          example: 0

    StandardOffenseCall:
      type: object
      required: [play_type, strategy, target]
      properties:
        play_type:
          $ref: "#/components/schemas/OffensivePlayType"
        strategy:
          $ref: "#/components/schemas/OffensiveStrategy"
        target:
          $ref: "#/components/schemas/OffensiveBox"

    DefenseCall:
      description: "Defense play call - varies by play type context"
      oneOf:
        - $ref: "#/components/schemas/KickoffDefenseCall"
        - $ref: "#/components/schemas/PuntDefenseCall"
        - $ref: "#/components/schemas/StandardDefenseCall"

    KickoffDefenseCall:
      type: object
      description: "Kickoff defense call (no options, empty object)"

    PuntDefenseCall:
      type: object
      required: [attempt_block]
      properties:
        attempt_block:
          type: boolean
          description: Whether to attempt blocking the punt
          example: false

    StandardDefenseCall:
      type: object
      required: [defense_type, strategy, def_players]
      properties:
        defense_type:
          $ref: "#/components/schemas/DefensivePlay"
        strategy:
          $ref: "#/components/schemas/DefensiveStrategy"
        key:
          $ref: "#/components/schemas/OffensiveBox"
          nullable: true
          description: "Keyed offensive player position (for coverage strategies)"
        def_players:
          type: array
          items:
            type: string
          description: Defensive player IDs involved in the strategy

    # --- Enum Schemas ---

    PlayType:
      type: string
      enum: [Kickoff, Punt, ExtraPoint, FieldGoal, Standard, None]
      description: Type of play to execute

    OffensivePlayType:
      type: string
      enum: [SL, SR, IL, IR, ER, QK, SH, LG, SC]
      description: |
        Offensive play type:
        - SL: Sweep Left
        - SR: Sweep Right
        - IL: Inside Left
        - IR: Inside Right
        - ER: End Run
        - QK: Quick pass
        - SH: Short pass
        - LG: Long pass
        - SC: Screen pass

    OffensiveStrategy:
      type: string
      enum: [NoStrategy, Sneak, Flop, Draw, PlayAction]
      description: Offensive strategy modifier

    OffensiveBox:
      type: string
      enum: [QB, B1, B2, B3, RE, LE, FL1, FL2, LT, LG, C, RG, RT]
      description: Offensive player position/box

    DefensivePlay:
      type: string
      enum: [RunDefense, PassDefense, PreventDefense, Blitz]
      description: Defensive play type

    DefensiveStrategy:
      type: string
      enum: [Straight, DoubleCover, TripleCover, DoubleCoverX2]
      description: Defensive coverage strategy

    # --- Game State Schemas ---

    GameState:
      type: object
      properties:
        last_status:
          $ref: "#/components/schemas/GamePlayStatus"
        quarter:
          type: integer
          example: 1
        time_remaining:
          type: integer
          description: Time remaining in the quarter
          example: 900
        possession:
          $ref: "#/components/schemas/GameTeams"
        down:
          $ref: "#/components/schemas/Down"
        yard_line:
          type: integer
          description: Current yard line position
          example: 35
        first_down_target:
          type: integer
          description: Yard line needed for a first down
          example: 45
        home_score:
          type: integer
          example: 0
        away_score:
          type: integer
          example: 0
        play_counter:
          type: integer
          description: Total plays executed in the game
          example: 0

    GamePlayStatus:
      type: string
      enum: [Touchdown, Safety, FieldGoal, PossessionChange, Ongoing, Start, End]

    GameTeams:
      type: string
      enum: [Home, Away]

    Down:
      type: string
      enum: [First, Second, Third, Fourth]

    # --- Play Result Schemas ---

    PlayResult:
      type: object
      properties:
        result_type:
          $ref: "#/components/schemas/ResultType"
        result:
          type: integer
          description: Yards gained/lost on the play
        final_line:
          type: integer
          description: Final yard line after the play
        time:
          type: integer
          description: Time elapsed during the play
        details:
          type: array
          items:
            type: string
          description: Human-readable play detail messages
        mechanic:
          type: array
          items:
            type: string
          description: Game mechanic steps taken during resolution
        extra:
          type: string
          nullable: true
          description: Extra information about the play
        cards:
          $ref: "#/components/schemas/CardResults"

    ResultType:
      type: string
      enum: [Regular, TurnOver]

    CardResults:
      type: object
      properties:
        had_z:
          type: boolean
          description: Whether a Z result occurred
        cards_flipped:
          type: array
          items:
            type: integer
          description: FAC card indices used during the play

    PlayAndState:
      type: object
      properties:
        play:
          $ref: "#/components/schemas/Play"
        result:
          $ref: "#/components/schemas/PlayResult"
        new_state:
          $ref: "#/components/schemas/GameState"

    Play:
      description: "The play that was executed (varies by type)"
      oneOf:
        - type: object
          properties:
            StandardPlay:
              type: object
              description: Standard play details
        - type: object
          properties:
            Kickoff:
              type: object
              description: Kickoff play details

    # --- Roster Schema ---

    SerializableRoster:
      type: object
      description: Full team roster with all player position groups
      properties:
        team_name:
          type: string
        qbs:
          type: array
          items:
            type: object
        rbs:
          type: array
          items:
            type: object
        wrs:
          type: array
          items:
            type: object
        tes:
          type: array
          items:
            type: object
        ols:
          type: array
          items:
            type: object
        dls:
          type: array
          items:
            type: object
        lbs:
          type: array
          items:
            type: object
        dbs:
          type: array
          items:
            type: object
        ks:
          type: array
          items:
            type: object
