info:
  name: Set Kickoff Def Lineup
  type: http
  seq: 6

http:
  method: POST
  url: "{{spf_host}}/defense/lineup"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "kr": "KR-27"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
