info:
  name: Set Off Call - Pass
  type: http
  seq: 16

http:
  method: POST
  url: "{{spf_host}}/offense/call"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "play_type": "SH",
        "strategy": "NoStrategy",
        "target": "RE"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
