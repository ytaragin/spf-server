info:
  name: Set Kickoff Off Call
  type: http
  seq: 7

http:
  method: POST
  url: "{{spf_host}}/offense/call"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "onside": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
