info:
  name: Start Game
  type: http
  seq: 1

http:
  method: POST
  url: "{{spf_host}}/game/start"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
      	"home": { "name": "Washington", "year": "1983" },
      	"away": { "name": "Dallas", "year": "1983" }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
