info:
  name: Set Play Type - Kickoff
  type: http
  seq: 4

http:
  method: POST
  url: "{{spf_host}}/game/nexttype"
  headers:
    - name: Content-Type
      value: text/plain
  body:
    type: text
    data: Kickoff
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
